apiVersion: apps/v1
kind: Deployment
metadata:
  name: switchsignal
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: switchsignal
  template:
    metadata:
      labels:
        app: switchsignal
    spec:
      containers:
        - name: switchsignal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            {{- toYaml .Values.env | nindent 12 }}
          envFrom:
            - secretRef:
                name: switchsignal-secrets
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: switchsignal-data
          {{- else }}
          emptyDir: {}
          {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: switchsignal-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: switchsignal
spec:
  selector:
    app: switchsignal
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
